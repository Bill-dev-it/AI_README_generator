<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>README Generator — AI-Powered</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12;
      --surface: #141720;
      --surface2: #1c2030;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.16);
      --accent: #00e5a0;
      --accent-dim: rgba(0,229,160,0.12);
      --accent-border: rgba(0,229,160,0.35);
      --text: #eef0f4;
      --text-muted: #7a8096;
      --text-subtle: #4a5068;
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'Syne', sans-serif;
      --radius: 10px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      padding: 2.5rem 1rem 4rem;
    }

    /* subtle grid bg */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      max-width: 700px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    .header {
      margin-bottom: 2.5rem;
      animation: fadeUp 0.5s ease both;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--accent-dim); border: 1px solid var(--accent-border);
      border-radius: 99px; padding: 4px 12px;
      font-size: 11px; font-family: var(--mono);
      color: var(--accent); letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }
    .badge::before { content: '●'; font-size: 8px; }
    h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 700;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 0.6rem;
    }
    h1 span { color: var(--accent); }
    .subtitle {
      font-size: 15px; color: var(--text-muted); line-height: 1.6;
      font-family: var(--mono); font-weight: 400;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.75rem;
      animation: fadeUp 0.5s 0.1s ease both;
    }

    .field { margin-bottom: 1.25rem; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 11px; font-family: var(--mono);
      color: var(--text-muted); letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input[type="text"], textarea, select {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 14px; font-family: var(--mono);
      color: var(--text); outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, textarea:focus, select:focus {
      border-color: var(--accent-border);
    }
    textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
    select { cursor: pointer; }
    select option { background: var(--surface2); }

    /* chip buttons */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      padding: 5px 13px; font-size: 12px; font-family: var(--mono);
      border-radius: 99px; cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      transition: all 0.15s;
    }
    .chip:hover { border-color: var(--border-hover); color: var(--text); }
    .chip.on {
      border-color: var(--accent-border);
      background: var(--accent-dim);
      color: var(--accent);
    }

    /* divider */
    .divider {
      border: none; border-top: 1px solid var(--border);
      margin: 1.5rem 0;
    }

    /* generate button */
    .btn-generate {
      width: 100%; padding: 13px;
      background: var(--accent); color: #000;
      font-family: var(--sans); font-size: 15px; font-weight: 600;
      border: none; border-radius: var(--radius);
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .btn-generate:hover { opacity: 0.88; }
    .btn-generate:active { transform: scale(0.98); }
    .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }

    .error-msg {
      font-size: 13px; font-family: var(--mono);
      color: #ff6b6b; margin-top: 10px;
    }

    /* ── Loading ── */
    #loading {
      display: none;
      text-align: center; padding: 3rem 1rem;
      animation: fadeUp 0.3s ease both;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1.2rem;
    }
    #loading p { font-family: var(--mono); font-size: 13px; color: var(--text-muted); }

    /* ── Result ── */
    #result { display: none; animation: fadeUp 0.4s ease both; }

    .result-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 10px;
      margin-bottom: 12px;
    }
    .result-title {
      font-size: 13px; font-family: var(--mono); color: var(--text-muted);
    }
    .result-title span { color: var(--accent); }

    .btn-sm {
      padding: 6px 14px; font-size: 12px; font-family: var(--mono);
      border-radius: 8px; cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2); color: var(--text-muted);
      transition: all 0.15s;
    }
    .btn-sm:hover { border-color: var(--border-hover); color: var(--text); }
    .btn-sm.primary {
      border-color: var(--accent-border);
      background: var(--accent-dim); color: var(--accent);
    }
    .btn-actions { display: flex; gap: 8px; }

    .code-block {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
    }
    .code-header {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .code-filename {
      font-size: 12px; font-family: var(--mono); color: var(--text-muted);
      margin-left: 4px;
    }
    #output {
      margin: 0; padding: 1.25rem 1.5rem;
      font-size: 13px; font-family: var(--mono);
      color: var(--text); line-height: 1.75;
      white-space: pre-wrap; word-break: break-word;
      max-height: 520px; overflow-y: auto;
    }
    #output::-webkit-scrollbar { width: 6px; }
    #output::-webkit-scrollbar-track { background: transparent; }
    #output::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 3px; }

    .back-btn {
      margin-top: 1rem;
      font-size: 12px; font-family: var(--mono);
      color: var(--text-subtle); background: none;
      border: none; cursor: pointer; padding: 0;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--text-muted); }

    /* tip box */
    .tip {
      margin-top: 1rem;
      background: var(--accent-dim); border: 1px solid var(--accent-border);
      border-radius: var(--radius); padding: 10px 14px;
      font-size: 12px; font-family: var(--mono); color: var(--accent);
      line-height: 1.6;
    }

    /* animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <div class="header">
    <div class="badge">AI-Powered Tool</div>
    <h1>Generate your<br><span>README</span> instantly</h1>
    <p class="subtitle">// describe your project → get a full README.md</p>
  </div>

  <!-- Form -->
  <div class="card" id="form-card">
    <div class="field">
      <label>Project name</label>
      <input type="text" id="proj-name" placeholder="e.g. cloud-deploy-cli" />
    </div>

    <div class="field">
      <label>What does it do? (1–3 sentences)</label>
      <textarea id="proj-desc" placeholder="e.g. A CLI tool that deploys Docker containers to AWS with a single command. Built for developers who want fast, reproducible cloud deployments without writing YAML."></textarea>
    </div>

    <div class="field">
      <label>Primary language</label>
      <div class="chips" id="lang-chips">
        <button class="chip on" data-val="JavaScript">JavaScript</button>
        <button class="chip" data-val="TypeScript">TypeScript</button>
        <button class="chip" data-val="Python">Python</button>
        <button class="chip" data-val="Go">Go</button>
        <button class="chip" data-val="Rust">Rust</button>
        <button class="chip" data-val="Java">Java</button>
        <button class="chip" data-val="Other">Other</button>
      </div>
    </div>

    <div class="field">
      <label>Sections to include</label>
      <div class="chips" id="section-chips">
        <button class="chip on" data-val="overview">Overview</button>
        <button class="chip on" data-val="features">Features</button>
        <button class="chip on" data-val="installation">Installation</button>
        <button class="chip on" data-val="usage">Usage</button>
        <button class="chip" data-val="contributing">Contributing</button>
        <button class="chip" data-val="license">License</button>
        <button class="chip" data-val="badges">Badges</button>
      </div>
    </div>

    <hr class="divider" />

    <button class="btn-generate" id="gen-btn" onclick="generate()">
      Generate README →
    </button>
    <p class="error-msg" id="error-msg"></p>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <p>AI is writing your README...</p>
  </div>

  <!-- Result -->
  <div id="result">
    <div class="result-toolbar">
      <span class="result-title">README.md — <span>ready</span></span>
      <div class="btn-actions">
        <button class="btn-sm" id="copy-btn" onclick="copyReadme()">Copy markdown</button>
        <button class="btn-sm primary" onclick="downloadReadme()">Download README.md</button>
      </div>
    </div>

    <div class="code-block">
      <div class="code-header">
        <div class="dot" style="background:#ff5f57"></div>
        <div class="dot" style="background:#febc2e"></div>
        <div class="dot" style="background:#28c840"></div>
        <span class="code-filename">README.md</span>
      </div>
      <pre id="output"></pre>
    </div>

    <div class="tip">
      💡 Paste the contents into a file called <strong>README.md</strong> at the root of your GitHub repo.
    </div>

    <button class="back-btn" onclick="reset()">← Generate another</button>
  </div>

</div>

<script>
  // ── chip single-select (language) ──
  document.getElementById('lang-chips').addEventListener('click', e => {
    if (!e.target.classList.contains('chip')) return;
    document.querySelectorAll('#lang-chips .chip').forEach(c => c.classList.remove('on'));
    e.target.classList.add('on');
  });

  // ── chip multi-select (sections) ──
  document.getElementById('section-chips').addEventListener('click', e => {
    if (!e.target.classList.contains('chip')) return;
    e.target.classList.toggle('on');
  });

  function getSelected(groupId) {
    return [...document.querySelectorAll(`#${groupId} .chip.on`)].map(c => c.dataset.val);
  }

  let generatedText = '';

  async function generate() {
    const name = document.getElementById('proj-name').value.trim();
    const desc = document.getElementById('proj-desc').value.trim();
    const lang = getSelected('lang-chips')[0] || 'JavaScript';
    const sections = getSelected('section-chips');

    // Validation
    const errEl = document.getElementById('error-msg');
    if (!name || !desc) {
      errEl.textContent = 'Please fill in the project name and description.';
      return;
    }
    if (sections.length === 0) {
      errEl.textContent = 'Please select at least one section.';
      return;
    }
    errEl.textContent = '';

    // Show loading
    document.getElementById('form-card').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('result').style.display = 'none';

    const prompt = `Generate a complete GitHub README.md for this project:

Project Name: ${name}
Description: ${desc}
Language: ${lang}
Sections: ${sections.join(', ')}

Rules:
- Use proper Markdown with headers, code blocks, and emojis in section titles
- Add shields.io badges at the top if "badges" is in the sections list
- Include realistic code snippets for install/usage sections
- Make it look like a real, well-maintained open source project
- Output ONLY the raw markdown. No explanation, no backticks wrapping the whole thing.`;

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await res.json();
      generatedText = data.content?.find(b => b.type === 'text')?.text || '';

      document.getElementById('output').textContent = generatedText;
      document.getElementById('loading').style.display = 'none';
      document.getElementById('result').style.display = 'block';

    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('form-card').style.display = 'block';
      errEl.textContent = 'Something went wrong. Please try again.';
    }
  }

  function copyReadme() {
    navigator.clipboard.writeText(generatedText);
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = 'Copy markdown', 2000);
  }

  function downloadReadme() {
    const blob = new Blob([generatedText], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'README.md'; a.click();
    URL.revokeObjectURL(url);
  }

  function reset() {
    document.getElementById('result').style.display = 'none';
    document.getElementById('form-card').style.display = 'block';
    generatedText = '';
  }
</script>
</body>
</html>
